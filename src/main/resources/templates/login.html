<!DOCTYPE html>
<html>
<head>
    <title>IDS Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-box">
    <h2>AI Network IDS Login</h2>

    <form action="/login" method="post">
        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
